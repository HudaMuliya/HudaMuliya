<svg width="100%" height="140" viewBox="0 0 1200 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050308"/>
      <stop offset="50%" stop-color="#160c2e"/>
      <stop offset="100%" stop-color="#0a0518"/>
    </linearGradient>
    <linearGradient id="textGradF" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="lineGradF" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8B6FE8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowF" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="140" rx="16" fill="url(#bgGradF)"/>
  <rect x="1.5" y="1.5" width="1197" height="137" rx="14" fill="none" stroke="#A78BFA" stroke-opacity="0.15" stroke-width="1.5"/>

  <line x1="350" y1="34" x2="850" y2="34" stroke="url(#lineGradF)" stroke-width="1.2"/>
  <circle cx="600" cy="34" r="2.6" fill="#A78BFA" filter="url(#glowF)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <text x="600" y="68" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="20" fill="url(#textGradF)">Huda Muliya</text>
  <text x="600" y="92" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" letter-spacing="1.5" fill="#9C95C2">Godean, D.I. Yogyakarta, Indonesia</text>
  <text x="600" y="118" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#7E76A8">"Combining logic with communication — building interfaces and connections."</text>
</svg>
