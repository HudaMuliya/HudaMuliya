<svg width="100%" height="34" viewBox="0 0 1200 34" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8B6FE8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </linearGradient>
    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <line x1="0" y1="17" x2="1200" y2="17" stroke="url(#lineGrad)" stroke-width="1.5"/>
  <circle cx="600" cy="17" r="3.5" fill="#A78BFA" filter="url(#dotGlow)">
    <animate attributeName="r" values="2.5;5.5;2.5" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="540" cy="17" r="1.6" fill="#60A5FA" opacity="0.7" filter="url(#dotGlow)">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="660" cy="17" r="1.6" fill="#60A5FA" opacity="0.7" filter="url(#dotGlow)">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.4s" repeatCount="indefinite"/>
  </circle>
</svg>
