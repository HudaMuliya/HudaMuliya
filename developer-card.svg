<svg xmlns="http://www.w3.org/2000/svg" width="830" height="300" viewBox="0 0 830 300" fill="none">
  <!-- Styles and Animations -->
  <style>
    .bg { fill: #0d1117; }
    .border-glow { stroke: url(#borderGradient); stroke-width: 2; filter: drop-shadow(0px 0px 8px rgba(0, 242, 254, 0.3)); }
    .title-dots { fill: #ff5f56; }
    .title-dots-2 { fill: #ffbd2e; }
    .title-dots-3 { fill: #27c93f; }
    
    .terminal-text {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      font-size: 14px;
      fill: #e1e4e8;
      white-space: nowrap;
    }
    
    .syntax-keyword { fill: #ff7b72; }
    .syntax-entity { fill: #d2a8ff; }
    .syntax-string { fill: #a5d6ff; }
    .syntax-number { fill: #79c0ff; }
    .syntax-comment { fill: #8b949e; }
    
    /* Fade In Animations with Delay */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .line-1 { animation: fadeIn 0.5s ease-out 0.5s both; }
    .line-2 { animation: fadeIn 0.5s ease-out 1.2s both; }
    .line-3 { animation: fadeIn 0.5s ease-out 1.9s both; }
    .line-4 { animation: fadeIn 0.5s ease-out 2.6s both; }
    .line-5 { animation: fadeIn 0.5s ease-out 3.3s both; }
    .line-6 { animation: fadeIn 0.5s ease-out 4.0s both; }
    .line-7 { animation: fadeIn 0.5s ease-out 4.7s both; }
    
    /* Cursor Animation */
    @keyframes blink {
      50% { opacity: 0; }
    }
    .cursor {
      stroke: #22d3ee;
      stroke-width: 2;
      animation: blink 0.8s infinite;
    }
    
    /* Floating Objects */
    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(3deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    .float-item-1 { animation: float 6s ease-in-out infinite; transform-origin: 650px 150px; }
    .float-item-2 { animation: float 8s ease-in-out infinite 1s; transform-origin: 720px 100px; }
    .float-item-3 { animation: float 7s ease-in-out infinite 2s; transform-origin: 700px 220px; }
    
    /* Radar Scan / Pulse */
    @keyframes pulse {
      0% { r: 5px; opacity: 0.8; }
      100% { r: 60px; opacity: 0; }
    }
    .radar-pulse {
      animation: pulse 3s ease-out infinite;
      stroke: #22d3ee;
      stroke-width: 1.5;
      fill: none;
    }
    
    /* Grid wave animation */
    @keyframes wave {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.45; }
    }
    .grid-line {
      stroke: #1f2937;
      stroke-width: 0.5;
    }
    .grid-dot {
      fill: #22d3ee;
      animation: wave 4s ease-in-out infinite;
      filter: drop-shadow(0px 0px 4px #22d3ee);
    }
  </style>

  <!-- Gradients -->
  <defs>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="avatarGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(34, 211, 238, 0.12)" />
      <stop offset="100%" stop-color="rgba(249, 115, 22, 0.05)" />
    </linearGradient>
  </defs>

  <!-- Card Background -->
  <rect x="2" y="2" width="826" height="296" rx="16" fill="#0a0d14" />
  <rect x="1" y="1" width="828" height="298" rx="17" fill="none" class="border-glow" />

  <!-- Animated Tech Grid Background -->
  <g opacity="0.4">
    <!-- Verticals -->
    <line x1="100" y1="0" x2="100" y2="300" class="grid-line" />
    <line x1="200" y1="0" x2="200" y2="300" class="grid-line" />
    <line x1="300" y1="0" x2="300" y2="300" class="grid-line" />
    <line x1="400" y1="0" x2="400" y2="300" class="grid-line" />
    <line x1="500" y1="0" x2="500" y2="300" class="grid-line" />
    <line x1="600" y1="0" x2="600" y2="300" class="grid-line" />
    <line x1="700" y1="0" x2="700" y2="300" class="grid-line" />
    
    <!-- Horizontals -->
    <line x1="0" y1="50" x2="830" y2="50" class="grid-line" />
    <line x1="0" y1="100" x2="830" y2="100" class="grid-line" />
    <line x1="0" y1="150" x2="830" y2="150" class="grid-line" />
    <line x1="0" y1="200" x2="830" y2="200" class="grid-line" />
    <line x1="0" y1="250" x2="830" y2="250" class="grid-line" />
    
    <!-- Grid Nodes -->
    <circle cx="500" cy="150" r="3" class="grid-dot" style="animation-delay: 0s;" />
    <circle cx="600" cy="100" r="3" class="grid-dot" style="animation-delay: 0.5s;" />
    <circle cx="700" cy="200" r="3" class="grid-dot" style="animation-delay: 1s;" />
    <circle cx="400" cy="250" r="3" class="grid-dot" style="animation-delay: 1.5s;" />
    <circle cx="300" cy="100" r="3" class="grid-dot" style="animation-delay: 2s;" />
  </g>

  <!-- Left Window (IDE Terminal Mock) -->
  <g transform="translate(30, 30)">
    <!-- Terminal Header -->
    <rect width="450" height="240" rx="8" fill="#040609" stroke="#1f2937" stroke-width="1.5" />
    <circle cx="20" cy="15" r="6" class="title-dots" />
    <circle cx="40" cy="15" r="6" class="title-dots-2" />
    <circle cx="60" cy="15" r="6" class="title-dots-3" />
    <text x="225" y="19" font-family="'Courier New', Courier, monospace" font-size="11" fill="#8b949e" text-anchor="middle">huda--profile.js</text>
    
    <!-- Terminal Content (Lines of Code) -->
    <g transform="translate(25, 55)">
      <!-- Line 1 -->
      <g class="line-1">
        <text class="terminal-text" x="0" y="0">
          <tspan class="syntax-keyword">const</tspan> <tspan class="syntax-entity">hudaMuliya</tspan> = {
        </text>
      </g>
      
      <!-- Line 2 -->
      <g class="line-2" transform="translate(0, 24)">
        <text class="terminal-text" x="0" y="0">
          role: <tspan class="syntax-string">"Creative Technologist"</tspan>,
        </text>
      </g>
      
      <!-- Line 3 -->
      <g class="line-3" transform="translate(0, 48)">
        <text class="terminal-text" x="0" y="0">
          skills: [<tspan class="syntax-string">"React"</tspan>, <tspan class="syntax-string">"UI/UX"</tspan>, <tspan class="syntax-string">"Public Speaking"</tspan>],
        </text>
      </g>
      
      <!-- Line 4 -->
      <g class="line-4" transform="translate(0, 72)">
        <text class="terminal-text" x="0" y="0">
          gpa: <tspan class="syntax-number">3.95</tspan>,
        </text>
      </g>
      
      <!-- Line 5 -->
      <g class="line-5" transform="translate(0, 96)">
        <text class="terminal-text" x="0" y="0">
          himatikaLeader: <tspan class="syntax-keyword">true</tspan>,
        </text>
      </g>
      
      <!-- Line 6 -->
      <g class="line-6" transform="translate(0, 120)">
        <text class="terminal-text" x="0" y="0">
          status: <tspan class="syntax-string">"Building_Great_Products"</tspan>
        </text>
      </g>
      
      <!-- Line 7 -->
      <g class="line-7" transform="translate(0, 144)">
        <text class="terminal-text" x="0" y="0">
          };
        </text>
        <!-- Blinking cursor -->
        <line x1="28" y1="-12" x2="28" y2="4" class="cursor" />
      </g>
    </g>
  </g>

  <!-- Right Visual Section (Tech Network & Floating Elements) -->
  <g transform="translate(520, 0)">
    <!-- Central Glow Sphere -->
    <circle cx="150" cy="150" r="80" fill="url(#avatarGlow)" />
    
    <!-- Radar Rings -->
    <circle cx="150" cy="150" r="30" class="radar-pulse" style="animation-delay: 0s;" />
    <circle cx="150" cy="150" r="30" class="radar-pulse" style="animation-delay: 1.5s;" />

    <!-- Center node -->
    <circle cx="150" cy="150" r="10" fill="#22d3ee" filter="drop-shadow(0px 0px 8px #22d3ee)" />
    
    <!-- Orbiting/Floating Icons and Nodes -->
    
    <!-- Floating Node 1 (React Glow) -->
    <g class="float-item-1" transform="translate(60, 80)">
      <circle cx="0" cy="0" r="24" fill="#0c1017" stroke="#22d3ee" stroke-width="1.5" filter="drop-shadow(0px 0px 6px rgba(34, 211, 238, 0.4))" />
      <!-- Small mockup representation of React/Atom -->
      <ellipse rx="14" ry="5" stroke="#22d3ee" stroke-width="1" fill="none" transform="rotate(30)" />
      <ellipse rx="14" ry="5" stroke="#22d3ee" stroke-width="1" fill="none" transform="rotate(90)" />
      <ellipse rx="14" ry="5" stroke="#22d3ee" stroke-width="1" fill="none" transform="rotate(150)" />
      <circle cx="0" cy="0" r="2.5" fill="#22d3ee" />
    </g>
    
    <!-- Floating Node 2 (Mic Public Speaking) -->
    <g class="float-item-2" transform="translate(230, 90)">
      <circle cx="0" cy="0" r="24" fill="#0c1017" stroke="#f97316" stroke-width="1.5" filter="drop-shadow(0px 0px 6px rgba(249, 115, 22, 0.4))" />
      <!-- Microphone icon -->
      <rect x="-4" y="-10" width="8" height="13" rx="4" fill="#f97316" />
      <path d="M-7 -4 A 7 7 0 0 0 7 -4" stroke="#f97316" stroke-width="1.5" fill="none" />
      <line x1="0" y1="3" x2="0" y2="9" stroke="#f97316" stroke-width="1.5" />
      <line x1="-5" y1="9" x2="5" y2="9" stroke="#f97316" stroke-width="1.5" />
    </g>

    <!-- Floating Node 3 (Design / Figma) -->
    <g class="float-item-3" transform="translate(150, 220)">
      <circle cx="0" cy="0" r="24" fill="#0c1017" stroke="#a855f7" stroke-width="1.5" filter="drop-shadow(0px 0px 6px rgba(168, 85, 247, 0.4))" />
      <!-- Design system icon mockup -->
      <circle cx="-4" cy="-4" r="4" fill="#f24e1e" />
      <path d="M-4 4 A 4 4 0 0 1 0 0" fill="#a259ff" />
      <circle cx="4" cy="-4" r="4" fill="#ff7262" />
      <circle cx="4" cy="4" r="4" fill="#1abc9c" />
      <rect x="-4" y="0" width="4" height="4" fill="#0cf" />
    </g>
    
    <!-- Connecting network lines -->
    <line x1="150" y1="150" x2="60" y2="80" stroke="#22d3ee" stroke-width="1" opacity="0.3" stroke-dasharray="4,4" />
    <line x1="150" y1="150" x2="230" y2="90" stroke="#f97316" stroke-width="1" opacity="0.3" stroke-dasharray="4,4" />
    <line x1="150" y1="150" x2="150" y2="220" stroke="#a855f7" stroke-width="1" opacity="0.3" stroke-dasharray="4,4" />
  </g>
</svg>
