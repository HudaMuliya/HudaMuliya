<svg width="100%" height="460" viewBox="-20 -10 680 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgRadar" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1a1033" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#05030a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dataFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="dataStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
    <filter id="nodeGlow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .grow { transform-origin: 300px 230px; opacity: 0; animation: growRadar 1.3s cubic-bezier(0.22,1,0.36,1) 0.15s forwards; }
      @keyframes growRadar { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      .ring { opacity: 0; animation: fadeIn 0.8s ease forwards; }
      .ring1 { animation-delay: 0s; }
      .ring2 { animation-delay: 0.15s; }
      .ring3 { animation-delay: 0.3s; }
      .axis { opacity: 0; animation: fadeIn 0.8s ease 0.3s forwards; }
      @keyframes fadeIn { to { opacity: 1; } }
      .label { opacity: 0; animation: fadeIn 0.6s ease forwards; }
      .node { opacity: 0; animation: popIn 0.5s ease forwards; }
      @keyframes popIn { from { opacity: 0; transform: scale(0); } to { opacity: 1; transform: scale(1); } }
      .pulseStroke { animation: pulseGlow 3s ease-in-out 1.6s infinite; }
      @keyframes pulseGlow { 0%,100% { stroke-width: 2; } 50% { stroke-width: 3; } }
    </style>
  </defs>

  <circle cx="300" cy="230" r="190" fill="url(#bgRadar)"/>

  <!-- grid rings -->
  <polygon class="ring ring1" points="300.00,180.50 335.00,195.00 349.50,230.00 335.00,265.00 300.00,279.50 265.00,265.00 250.50,230.00 265.00,195.00" fill="none" stroke="#7B68B8" stroke-width="1" stroke-opacity="0.35"/>
  <polygon class="ring ring2" points="300.00,131.00 370.00,160.00 399.00,230.00 370.00,300.00 300.00,329.00 230.00,300.00 201.00,230.00 230.00,160.00" fill="none" stroke="#7B68B8" stroke-width="1" stroke-opacity="0.3"/>
  <polygon class="ring ring3" points="300.00,80.00 406.07,123.93 450.00,230.00 406.07,336.07 300.00,380.00 193.93,336.07 150.00,230.00 193.93,123.93" fill="none" stroke="#7B68B8" stroke-width="1.2" stroke-opacity="0.4"/>

  <!-- axis lines -->
  <g class="axis" stroke="#5B4E8A" stroke-width="1" stroke-opacity="0.45">
    <line x1="300" y1="230" x2="300.0" y2="80.0"/>
    <line x1="300" y1="230" x2="406.07" y2="123.93"/>
    <line x1="300" y1="230" x2="450.0" y2="230.0"/>
    <line x1="300" y1="230" x2="406.07" y2="336.07"/>
    <line x1="300" y1="230" x2="300.0" y2="380.0"/>
    <line x1="300" y1="230" x2="193.93" y2="336.07"/>
    <line x1="300" y1="230" x2="150.0" y2="230.0"/>
    <line x1="300" y1="230" x2="193.93" y2="123.93"/>
  </g>

  <!-- data polygon -->
  <g class="grow">
    <polygon points="300.00,87.50 390.16,139.84 420.00,230.00 395.46,325.46 300.00,357.50 220.45,309.55 180.00,230.00 220.45,150.45" fill="url(#dataFill)" stroke="url(#dataStroke)" stroke-width="2" class="pulseStroke" stroke-linejoin="round"/>
  </g>

  <!-- data nodes -->
  <g filter="url(#nodeGlow)">
    <circle class="node" style="animation-delay:1.5s" cx="300.00" cy="87.50" r="4" fill="#C4B5FD"/>
    <circle class="node" style="animation-delay:1.55s" cx="390.16" cy="139.84" r="4" fill="#C4B5FD"/>
    <circle class="node" style="animation-delay:1.6s" cx="420.00" cy="230.00" r="4" fill="#A5B4FC"/>
    <circle class="node" style="animation-delay:1.65s" cx="395.46" cy="325.46" r="4" fill="#93C5FD"/>
    <circle class="node" style="animation-delay:1.7s" cx="300.00" cy="357.50" r="4" fill="#7DD3FC"/>
    <circle class="node" style="animation-delay:1.75s" cx="220.45" cy="309.55" r="4" fill="#93C5FD"/>
    <circle class="node" style="animation-delay:1.8s" cx="180.00" cy="230.00" r="4" fill="#A5B4FC"/>
    <circle class="node" style="animation-delay:1.85s" cx="220.45" cy="150.45" r="4" fill="#C4B5FD"/>
  </g>

  <!-- labels -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#E9E5FB">
    <text class="label" style="animation-delay:0.5s" x="300.0" y="40" text-anchor="middle">Public Speaking <tspan fill="#A78BFA" font-weight="700">95</tspan></text>
    <text class="label" style="animation-delay:0.55s" x="434" y="96" text-anchor="start">Branding <tspan fill="#A78BFA" font-weight="700">85</tspan></text>
    <text class="label" style="animation-delay:0.6s" x="488" y="234" text-anchor="start">Digital Content <tspan fill="#A78BFA" font-weight="700">80</tspan></text>
    <text class="label" style="animation-delay:0.65s" x="434" y="364" text-anchor="start">Leadership <tspan fill="#A78BFA" font-weight="700">90</tspan></text>
    <text class="label" style="animation-delay:0.7s" x="300.0" y="430" text-anchor="middle">Frontend Dev <tspan fill="#60A5FA" font-weight="700">85</tspan></text>
    <text class="label" style="animation-delay:0.75s" x="166" y="364" text-anchor="end">Backend &amp; API <tspan fill="#60A5FA" font-weight="700">75</tspan></text>
    <text class="label" style="animation-delay:0.8s" x="112" y="234" text-anchor="end">UI/UX Design <tspan fill="#60A5FA" font-weight="700">80</tspan></text>
    <text class="label" style="animation-delay:0.85s" x="166" y="96" text-anchor="end">Architecture <tspan fill="#60A5FA" font-weight="700">75</tspan></text>
  </g>
</svg>
