<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 20" width="100%" height="20">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(167, 139, 250, 0)" />
      <stop offset="35%" stop-color="rgba(167, 139, 250, 0.4)" />
      <stop offset="50%" stop-color="rgba(236, 72, 153, 0.8)" />
      <stop offset="65%" stop-color="rgba(59, 130, 246, 0.4)" />
      <stop offset="100%" stop-color="rgba(59, 130, 246, 0)" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main line -->
  <line x1="50" y1="10" x2="750" y2="10" stroke="url(#lineGrad)" stroke-width="1.5" />
  
  <!-- Glowing center dot -->
  <circle cx="400" cy="10" r="3" fill="#ffffff" filter="url(#glow)" />
  <circle cx="400" cy="10" r="6" stroke="#ec4899" stroke-width="1" fill="none" opacity="0.6" filter="url(#glow)" />
</svg>
