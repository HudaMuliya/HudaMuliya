<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%" height="100%">
  <!-- Background with dark tech gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0714" />
      <stop offset="50%" stop-color="#140f2d" />
      <stop offset="100%" stop-color="#05030a" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <!-- Blur for glows -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bgGrad)" />

  <!-- Wave decorations -->
  <path d="M0,100 C150,150 350,50 600,120 C850,190 1050,100 1200,150 L1200,320 L0,320 Z" fill="rgba(167, 139, 250, 0.03)" />
  <path d="M0,200 C200,100 400,280 700,180 C1000,80 1100,220 1200,160 L1200,320 L0,320 Z" fill="rgba(236, 72, 153, 0.02)" />

  <!-- Wave Lines with gradient strokes -->
  <path d="M-50,160 Q250,80 550,200 T1250,100" fill="none" stroke="url(#glowGrad)" stroke-width="2" opacity="0.3" filter="url(#neonGlow)" />
  <path d="M-50,120 Q300,240 600,100 T1250,220" fill="none" stroke="url(#glowGrad)" stroke-width="1" opacity="0.2" />

  <!-- Code Dots / Tech Elements -->
  <g opacity="0.2">
    <circle cx="100" cy="80" r="2" fill="#a78bfa" />
    <circle cx="150" cy="220" r="3" fill="#ec4899" />
    <circle cx="1050" cy="100" r="2" fill="#3b82f6" />
    <circle cx="1120" cy="240" r="4" fill="#a78bfa" />
    <line x1="80" y1="100" x2="140" y2="100" stroke="#a78bfa" stroke-width="0.5" stroke-dasharray="3,3" />
    <line x1="1020" y1="120" x2="1080" y2="120" stroke="#3b82f6" stroke-width="0.5" stroke-dasharray="3,3" />
  </g>

  <!-- Title / Branding -->
  <g transform="translate(600, 130)" text-anchor="middle">
    <!-- Big glowing shadow title -->
    <text y="0" font-family="'Inter', -apple-system, system-ui, BlinkMacSystemFont, sans-serif" font-weight="900" font-size="64" fill="#ffffff" letter-spacing="8" filter="url(#neonGlow)">HUDA MULIYA</text>
    
    <!-- Subtitle -->
    <text y="50" font-family="'Inter', -apple-system, system-ui, BlinkMacSystemFont, sans-serif" font-weight="500" font-size="20" fill="#a78bfa" letter-spacing="4">CREATIVE TECHNOLOGIST</text>
    <text y="80" font-family="'Inter', -apple-system, system-ui, BlinkMacSystemFont, sans-serif" font-weight="400" font-size="14" fill="#94a3b8" letter-spacing="2">Frontend Developer • UI/UX Designer • Public Speaker</text>
  </g>
</svg>
