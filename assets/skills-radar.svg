<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" width="100%" height="320">
  <defs>
    <linearGradient id="radarGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(167, 139, 250, 0.45)" />
      <stop offset="100%" stop-color="rgba(236, 72, 153, 0.15)" />
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="560" height="320" fill="none" />

  <!-- Concentric Hexagon Grids -->
  <!-- Level 25% -->
  <polygon points="280,135 301.6,147.5 301.6,172.5 280,185 258.4,172.5 258.4,147.5" fill="none" stroke="#1e293b" stroke-width="1" />
  <!-- Level 50% -->
  <polygon points="280,110 323.3,135 323.3,185 280,210 236.7,185 236.7,135" fill="none" stroke="#334155" stroke-width="1" />
  <!-- Level 75% -->
  <polygon points="280,85 344.9,122.5 344.9,197.5 280,235 215.1,197.5 215.1,122.5" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="2,2" />
  <!-- Level 100% -->
  <polygon points="280,60 366.6,110 366.6,210 280,260 193.4,210 193.4,110" fill="none" stroke="#64748b" stroke-width="1" />

  <!-- Axis Lines -->
  <line x1="280" y1="160" x2="280" y2="60" stroke="#475569" stroke-width="1" />
  <line x1="280" y1="160" x2="366.6" y2="110" stroke="#475569" stroke-width="1" />
  <line x1="280" y1="160" x2="366.6" y2="210" stroke="#475569" stroke-width="1" />
  <line x1="280" y1="160" x2="280" y2="260" stroke="#475569" stroke-width="1" />
  <line x1="280" y1="160" x2="193.4" y2="210" stroke="#475569" stroke-width="1" />
  <line x1="280" y1="160" x2="193.4" y2="110" stroke="#475569" stroke-width="1" />

  <!-- Shaded Skill Area -->
  <polygon points="280,72 353.6,117.5 357.9,205 280,240 197.7,207.5 215,122.5" fill="url(#radarGlow)" stroke="#a78bfa" stroke-width="2" filter="url(#neon)" />
  
  <!-- Data Points -->
  <circle cx="280" cy="72" r="3.5" fill="#ffffff" stroke="#a78bfa" stroke-width="1.5" />
  <circle cx="353.6" cy="117.5" r="3.5" fill="#ffffff" stroke="#a78bfa" stroke-width="1.5" />
  <circle cx="357.9" cy="205" r="3.5" fill="#ffffff" stroke="#a78bfa" stroke-width.5" />
  <circle cx="280" cy="240" r="3.5" fill="#ffffff" stroke="#a78bfa" stroke-width="1.5" />
  <circle cx="197.7" cy="207.5" r="3.5" fill="#ffffff" stroke="#a78bfa" stroke-width="1.5" />
  <circle cx="215" cy="122.5" r="3.5" fill="#ffffff" stroke="#a78bfa" stroke-width="1.5" />

  <!-- Labels -->
  <text x="280" y="45" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Frontend Development (88%)</text>
  <text x="380" y="108" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa" text-anchor="start">UI/UX Design (85%)</text>
  <text x="380" y="215" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa" text-anchor="start">Leadership (90%)</text>
  <text x="280" y="278" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Brand &amp; Creative (80%)</text>
  <text x="180" y="215" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#ec4899" text-anchor="end">Public Speaking (95%)</text>
  <text x="180" y="108" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#ec4899" text-anchor="end">Backend &amp; API (75%)</text>
</svg>
